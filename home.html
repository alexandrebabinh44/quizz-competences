<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nickel Master</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container wide">
  <h1 id="welcome">Bienvenue</h1>
  <p class="subtitle">Choisis ton espace de travail</p>

  <div class="menu-grid" id="menuGrid"></div>
</div>

<script>
const fullName = localStorage.getItem("full_name");
const role = localStorage.getItem("role");

document.getElementById("welcome").innerText = "Bienvenue " + fullName;

const menu = document.getElementById("menuGrid");

function addCard(title, text, page) {
  if (page === "logout") {
    menu.innerHTML += `
      <div class="card" onclick="logout()">
        <h2>${title}</h2>
        <p>${text}</p>
      </div>
    `;
  } else {
    menu.innerHTML += `
      <div class="card" onclick="window.location.href='${page}'">
        <h2>${title}</h2>
        <p>${text}</p>
      </div>
    `;
  }
}
addCard("🚪 Déconnexion", "Changer de profil.", "logout");
addCard("📝 Bilan", "Quiz compétences avec réponses ouvertes.", "quiz.html");
addCard("🎯 Entraînement", "Quiz par catégorie.", "#");
addCard("📚 Formation", "Tips, fiches et rappels pratiques.", "#");
addCard("🏆 Classement", "Score personnel et global.", "#");
addCard("🎖️ Badges", "Niveaux, XP et récompenses.", "#");
addCard("👤 Mon Profil", "Voir mes informations et ma progression.", "profile.html");

if (role === "senior") {
  addCard("👥 Mon Équipe", "Consulter les membres de l'équipe.", "team.html");
}

if (role === "team_leader") {
  addCard("👥 Mon Équipe", "Gérer les membres de ton équipe.", "team.html");
  addCard("📊 Résultats Équipe", "Voir les résultats de ton équipe.", "#");
}

if (role === "manager") {
  addCard("📈 Dashboard Manager", "Vue multi-équipes.", "#");
}

if (role === "responsable") {
  addCard("📊 Dashboard Responsable", "Vue service et équipes.", "#");
}

if (role === "direction") {
  addCard("🏢 Dashboard Direction", "Vue globale relation clients.", "#");
}

if (role === "admin") {
  addCard("⚙️ Administration", "Gestion complète de Nickel Master.", "#");
  addCard("👥 Gestion utilisateurs", "Créer et modifier les profils.", "admin-users.html");
  addCard("🧩 Gestion quiz", "Créer questions, catégories et modules.", "#");
}
addCard("🚪 Déconnexion", "Changer de profil.", "index.html");
</script>

</body>
</html>

</body>
</html>
